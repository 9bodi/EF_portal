<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;height:100%;overflow:hidden}iframe{width:100%;height:100%;border:none}</style>
<script>
var cmiCache = {};
var parentOrigin = "http://localhost:3000";

window.addEventListener("message", function(e) {
  if (e.data && e.data.type === "scorm-init") {
    cmiCache = e.data.cmiData || {};
    if (cmiCache["cmi.core.lesson_status"] && cmiCache["cmi.core.lesson_status"] !== "not attempted") {
      cmiCache["cmi.core.entry"] = "resume";
    }
  }
});

var API = {
  LMSInitialize: function() {
    window.parent.postMessage({ type: "scorm-call", method: "LMSInitialize" }, parentOrigin);
    return "true";
  },
  LMSFinish: function() {
    window.parent.postMessage({ type: "scorm-call", method: "LMSFinish", cmiData: cmiCache }, parentOrigin);
    return "true";
  },
  LMSGetValue: function(el) {
    var v = cmiCache[el];
    if (v !== undefined && v !== null) return String(v);
    var d = {
      "cmi.core.student_id":"","cmi.core.student_name":"","cmi.core.lesson_location":"",
      "cmi.core.lesson_status":"not attempted","cmi.core.entry":"ab-initio",
      "cmi.core.score.raw":"","cmi.core.score.max":"100","cmi.core.score.min":"0",
      "cmi.core.total_time":"00:00:00","cmi.core.credit":"credit",
      "cmi.core.lesson_mode":"normal","cmi.core.exit":"","cmi.core.session_time":"00:00:00",
      "cmi.suspend_data":"","cmi.launch_data":"","cmi.comments":"","cmi.comments_from_lms":""
    };
    return d[el] !== undefined ? d[el] : "";
  },
  LMSSetValue: function(el, val) {
    cmiCache[el] = val;
    if (el === "cmi.core.lesson_status" || el === "cmi.core.score.raw" || el === "cmi.suspend_data") {
      window.parent.postMessage({ type: "scorm-call", method: "LMSCommit", cmiData: cmiCache }, parentOrigin);
    }
    return "true";
  },
  LMSCommit: function() {
    window.parent.postMessage({ type: "scorm-call", method: "LMSCommit", cmiData: cmiCache }, parentOrigin);
    return "true";
  },
  LMSGetLastError: function() { return "0"; },
  LMSGetErrorString: function() { return "No error"; },
  LMSGetDiagnostic: function() { return "No diagnostic"; }
};
</script>
</head>
<body>
<iframe id="scormframe" allowfullscreen></iframe>
<script>
var path = window.location.hash.substring(1);
if (path) document.getElementById("scormframe").src = path;
</script>
</body>
</html>
